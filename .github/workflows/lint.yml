name: Lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift-format:
    name: Swift format check
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Run swift-format lint
        run: |
          if command -v swift-format >/dev/null 2>&1; then
            swift-format lint --recursive --strict Sources Tests || exit 1
          else
            echo "swift-format not installed; running swift package plugin if available"
            swift package plugin --allow-writing-to-package-directory swift-format lint || true
          fi

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Ruff check
        run: |
          ruff check --output-format=github --exclude Vendor --exclude .venv .

      - name: Ruff format (check only)
        run: |
          ruff format --check --exclude Vendor --exclude .venv .

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 200}, document-start: disable, truthy: {check-keys: false}}}" .github/ || exit 1
