name: Dependency Review

# Reviews PRs for known-vulnerable dependencies and license issues.
# See https://github.com/actions/dependency-review-action

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check dependency graph availability
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.security_and_analysis.dependency_graph.status // "unavailable"' 2>/dev/null || echo unavailable)"
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          if [ "${status}" != "enabled" ]; then
            echo "Dependency graph is '${status}', so dependency review is skipped for this repository." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Dependency Review
        if: steps.dependency-graph.outputs.status == 'enabled'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
