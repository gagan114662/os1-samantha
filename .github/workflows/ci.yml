name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Install Python test dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install PyYAML
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run non-live agent evals
        run: |
          python3 scripts/run-evals.py \
            --json-report artifacts/evals/non-live-report.json \
            --markdown-report artifacts/evals/non-live-report.md

      - name: Publish eval report summary
        if: always()
        run: |
          if [ -f artifacts/evals/non-live-report.md ]; then
            cat artifacts/evals/non-live-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: os1-non-live-eval-report
          path: artifacts/evals/

      - name: Test
        run: swift test

      - name: Build app bundle
        run: HERMES_MAC_ARCHS=arm64 ./scripts/build-macos-app.sh
